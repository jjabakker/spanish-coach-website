site_name: Spanish Coach
site_description: Learn Spanish naturally with Spanish Coach — vocabulary, grammar, and conversation practice in one app.
site_author: Hans
site_url: https://spanishcoach.nl/

repo_name: spanish-coach-website
repo_url: https://github.com/jjabakker/spanish-coach-website

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Nunito
    code: Roboto Mono
  logo: assets/images/app-icon.png
  favicon: assets/images/app-icon.png
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.tabs.link

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/nav-expand.js

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - User Guide:
    - Spanish Coach:
      - Overview: user-guide/spanish-coach/index.md
      - Self Study:
        - Self Study: user-guide/self-study/index.md
        - Verbs:
          - Verbs: user-guide/verbs/index.md
          - Setup:
            - Setup: user-guide/verbs/setup/index.md
            - Select Verbs: user-guide/verbs/select-verbs/index.md
            - Select Tenses: user-guide/verbs/select-tenses/index.md
          - Study:
            - Study: user-guide/verbs/study/index.md
            - Conjugation Tables: user-guide/verbs/conjugation-tables/index.md
            - Word Meanings: user-guide/verbs/word-meanings-study/index.md
          - Test:
            - Test: user-guide/verbs/test/index.md
            - Conjugation Drill: user-guide/verbs/conjugation-drill/index.md
            - Verb Meanings Test: user-guide/verbs/verb-meanings-test/index.md
            - Recognition: user-guide/verbs/recognition/index.md
            - Past Participle: user-guide/verbs/past-participle/index.md
            - Gerundio: user-guide/verbs/gerundio/index.md
            - Indefinido: user-guide/verbs/indefinido/index.md
        - Nouns:
          - Nouns: user-guide/nouns/index.md
          - Setup:
            - Setup: user-guide/nouns/setup/index.md
            - Select Nouns: user-guide/nouns/setup-nouns/index.md
          - Study:
            - Study: user-guide/nouns/study/index.md
            - Meaning: user-guide/nouns/meaning-study/index.md
            - Alternate Gender: user-guide/nouns/alternate-gender/index.md
            - Noun Gender: user-guide/nouns/noun-gender/index.md
            - Plural Formation: user-guide/nouns/plural-formation/index.md
          - Test:
            - Test: user-guide/nouns/test/index.md
            - Meaning Test: user-guide/nouns/meaning-test/index.md
            - Pick the Correct Article: user-guide/nouns/correct-article/index.md
            - Singular / Plural: user-guide/nouns/singular-plural/index.md
            - Alternative Gender Pairs: user-guide/nouns/gender-pairs/index.md
            - Recall Noun Gender: user-guide/nouns/recall-gender/index.md
        - Words & Phrases:
          - Words & Phrases: user-guide/words-phrases/index.md
          - Select Words and Phrases: user-guide/words-phrases/select/index.md
          - Study Words and Phrases: user-guide/words-phrases/study/index.md
          - Test Words and Phrases: user-guide/words-phrases/test/index.md
      - Guided Lessons: user-guide/guided-lessons/index.md
  - Documentation:
    - Getting Started: documentation/getting-started.md
    - Features: documentation/features.md
    - FAQ: documentation/faq.md
  - Privacy Policy: privacy-policy.md
  - Support: support.md

extra:
  social:
    - icon: fontawesome/brands/app-store-ios
      link: https://apps.apple.com/app/6764284291
      name: Download on the App Store

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
