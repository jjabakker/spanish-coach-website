site_name: Spanish Coach
site_description: Learn Spanish naturally with Spanish Coach — vocabulary, grammar, and conversation practice in one app.
site_author: Hans
site_url: https://spanishcoach.nl/

repo_name: spanish-coach-website
repo_url: https://github.com/jjabakker/spanish-coach-website

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Nunito
    code: Roboto Mono
  logo: assets/images/app-icon.png
  favicon: assets/images/app-icon.png
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.tabs.link

extra_css:
  - assets/css/extra.css

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - User Guide:
    - Overview: user-guide/index.md
    - Main Screen: user-guide/main-screen/index.md
    - Self Study: user-guide/self-study/index.md
    - Verbs Coach:
      - Overview: user-guide/verbs-coach/index.md
      - Setup:
        - Selecting Verbs: user-guide/verbs-coach/select-verbs/index.md
        - Selecting Tenses: user-guide/verbs-coach/select-tenses/index.md
      - Study:
        - Conjugation Tables: user-guide/verbs-coach/conjugation-tables/index.md
        - Word Meanings: user-guide/verbs-coach/word-meanings-study/index.md
      - Tests:
        - Conjugation Drill: user-guide/verbs-coach/conjugation-drill/index.md
        - Word Meanings Flashcard: user-guide/verbs-coach/verb-meanings-test/index.md
        - Recognition: user-guide/verbs-coach/recognition/index.md
        - Gerund (Gerundio): user-guide/verbs-coach/gerundio/index.md
        - Past Participle: user-guide/verbs-coach/past-participle/index.md
        - Preterite (Indefinido): user-guide/verbs-coach/indefinido/index.md
  - Documentation:
    - Getting Started: documentation/getting-started.md
    - Features: documentation/features.md
    - FAQ: documentation/faq.md
  - Privacy Policy: privacy-policy.md
  - Support: support.md

extra:
  social:
    - icon: fontawesome/brands/app-store-ios
      link: https://apps.apple.com/app/6764284291
      name: Download on the App Store

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
