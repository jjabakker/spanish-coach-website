site_name: Spanish Coach
site_description: A focused, structured practice environment for Spanish verb conjugation, noun vocabulary, and everyday words and phrases — with adaptive sessions that prioritise the words you find hardest.
site_author: Hans Bakker
site_url: https://spanishcoach.nl/

theme:
  name: material
  palette:
  - scheme: default
    primary: grey
    accent: amber

  - scheme: slate
    primary: blue grey
    accent: amber
  font:
    text: Nunito
    code: Roboto Mono
  logo: assets/images/app-icon.png
  favicon: assets/images/app-icon.png
  features:
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.tabs.link

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/nav-expand.js

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - Documentation:
    - Getting Started: documentation/getting-started.md
    - Features: documentation/features.md
    - FAQ: documentation/faq.md
  - User Guide:
    - Main Screen: user-guide/spanish-coach/index.md
    - Settings: user-guide/settings/index.md
    - Self Study: user-guide/self-study/index.md
    - Verbs:
      - user-guide/verbs/index.md
      - Selecting Verbs: user-guide/verbs/select-verbs/index.md
      - Selecting Tenses: user-guide/verbs/select-tenses/index.md
      - Conjugation Tables: user-guide/verbs/conjugation-tables/index.md
      - Word Meanings (Study): user-guide/verbs/word-meanings-study/index.md
      - Conjugation Drill: user-guide/verbs/conjugation-drill/index.md
      - Word Meanings Flashcard: user-guide/verbs/verb-meanings-test/index.md
      - Recognition: user-guide/verbs/recognition/index.md
      - Past Participle: user-guide/verbs/past-participle/index.md
      - Gerundio: user-guide/verbs/gerundio/index.md
      - Indefinido: user-guide/verbs/indefinido/index.md
    - Nouns:
      - user-guide/nouns/index.md
      - Selecting Nouns: user-guide/nouns/setup-nouns/index.md
      - Meaning Study: user-guide/nouns/meaning-study/index.md
      - Alternate Gender Explained: user-guide/nouns/alternate-gender/index.md
      - Noun Gender Rules: user-guide/nouns/noun-gender/index.md
      - Plural Formation: user-guide/nouns/plural-formation/index.md
      - Meaning Test: user-guide/nouns/meaning-test/index.md
      - Pick the Correct Article: user-guide/nouns/correct-article/index.md
      - Singular / Plural: user-guide/nouns/singular-plural/index.md
      - Alternate Gender Pairs: user-guide/nouns/gender-pairs/index.md
      - Recall Noun Gender: user-guide/nouns/recall-gender/index.md
    - Words & Phrases:
      - user-guide/words-phrases/index.md
      - Select: user-guide/words-phrases/select/index.md
      - Study: user-guide/words-phrases/study/index.md
      - Test: user-guide/words-phrases/test/index.md
    - Guided Lessons: user-guide/guided-lessons/index.md
  - Privacy: privacy-policy.md
  - Terms: terms.md
  - Support: support.md

extra:
  social:
    - icon: fontawesome/brands/app-store-ios
      link: https://apps.apple.com/app/6764284291
      name: Download on the App Store

plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#efe4cf"
        color: "#3a3128"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
