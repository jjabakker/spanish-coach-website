site_name: Spanish Coach
site_description: Learn Spanish naturally with Spanish Coach — vocabulary, grammar, and conversation practice in one app.
site_author: Hans
site_url: https://spanishcoach.nl/

repo_name: spanish-coach-website
repo_url: https://github.com/jjabakker/spanish-coach-website

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Nunito
    code: Roboto Mono
  logo: assets/images/app-icon.png
  favicon: assets/images/app-icon.png
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.tabs.link

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/nav-expand.js

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - User Guide:
    - Spanish Coach: user-guide/main-screen/index.md
    - Self Study:
      - Overview: user-guide/self-study/index.md
      - Verbs:
        - Overview: user-guide/verbs-coach/index.md
        - Setup:
          - Verbs: user-guide/verbs-coach/select-verbs/index.md
          - Tenses: user-guide/verbs-coach/select-tenses/index.md
        - Study:
          - Conjugation: user-guide/verbs-coach/conjugation-tables/index.md
          - Meaning: user-guide/verbs-coach/word-meanings-study/index.md
        - Test:
          - Conjugation: user-guide/verbs-coach/conjugation-drill/index.md
          - Meaning: user-guide/verbs-coach/verb-meanings-test/index.md
          - Recognition: user-guide/verbs-coach/recognition/index.md
          - Past Participle: user-guide/verbs-coach/past-participle/index.md
          - Gerundio: user-guide/verbs-coach/gerundio/index.md
          - Indefinido: user-guide/verbs-coach/indefinido/index.md
      - Nouns:
        - Overview: user-guide/nouns/index.md
        - Setup:
          - Nouns: user-guide/nouns/setup-nouns/index.md
        - Study:
          - Meaning: user-guide/nouns/meaning-study/index.md
          - Alternate Gender: user-guide/nouns/alternate-gender/index.md
          - Noun Gender: user-guide/nouns/noun-gender/index.md
          - Plural Formation: user-guide/nouns/plural-formation/index.md
        - Test:
          - Meaning: user-guide/nouns/meaning-test/index.md
          - Pick the Correct Article: user-guide/nouns/correct-article/index.md
          - Singular / Plural: user-guide/nouns/singular-plural/index.md
          - Alternative Gender Pairs: user-guide/nouns/gender-pairs/index.md
          - Recall Noun Gender: user-guide/nouns/recall-gender/index.md
      - Words & Phrases:
        - Overview: user-guide/words-phrases/index.md
        - Select:
          - Select Words and Phrases: user-guide/words-phrases/select/index.md
        - Study:
          - Study Words and Phrases: user-guide/words-phrases/study/index.md
        - Test:
          - Test Words and Phrases: user-guide/words-phrases/test/index.md
    - Guided Lessons: user-guide/guided-lessons/index.md
  - Documentation:
    - Getting Started: documentation/getting-started.md
    - Features: documentation/features.md
    - FAQ: documentation/faq.md
  - Privacy Policy: privacy-policy.md
  - Support: support.md

extra:
  social:
    - icon: fontawesome/brands/app-store-ios
      link: https://apps.apple.com/app/6764284291
      name: Download on the App Store

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
